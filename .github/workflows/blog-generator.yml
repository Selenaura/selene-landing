name: Blog Article Generation
on:
  schedule:
    - cron: '0 7 * * 1,4'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate blog article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-blog.js
      - name: Commit and push
        run: |
          git config user.name "SELENE Bot"
          git config user.email "bot@selenaura.com"
          git add public/blog/ scripts/topics.json
          git diff --staged --quiet || (git commit -m "Blog $(date +%Y-%m-%d)" && git push)
      - name: Trigger Vercel deploy
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
